        /* 1. Define the regular font */
        @font-face {
            font-family: 'NewRailAlphabet';
            src: url('font/NewRailAlphabet-White.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        /* 2. Define the separate bold font file */
        @font-face {
            font-family: 'NewRailAlphabetBold';
            src: url('font/NewRailAlphabet-Bold.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        /* 3. Base Reset & Typography */
        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'NewRailAlphabet', sans-serif;
            background-color: #fff;
            color: #000;
            line-height: 1.4;
        }

        /* 4. Force <b> and <strong> tags to use the specific bold font file */
        b, strong {
            font-family: 'NewRailAlphabetBold', sans-serif;
            font-weight: normal; 
        }

        /* Layout Structure */
        .wrapper {
            display: flex;
			grid-template-columns: 35% 65%;
            min-height: 100vh;
        }

        /* Left Sidebar (Navigation) */
        nav {
            
            padding: 2rem;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            border-right: 1px solid #f0f0f0;
            
            display: block;
            flex-direction: column;
            box-sizing: border-box;
        }

        /* This pushes the about-section to the bottom */
        .about-section {
            margin-top: auto; 
            padding-bottom: 2rem;
            font-size: 0.9rem;
        }

        /* Right Content Area */
        main {
           
            padding: 2rem;
        }

        .logo {
            text-decoration: none;
            color: black;
            display: block;
            font-size: 1.5rem;
        }

        .show-list {
            list-style: none;
            padding: 0;
            font-size: 0.9rem;
        }

        .show-item {
            margin-bottom: 1.5rem;
        }

        .show-item a {
            text-decoration: none;
            color: #000;
        }

        .show-item a:hover {
            text-decoration: underline;
        }

        .show-title {
            font-family: 'NewRailAlphabetBold', sans-serif;
        }

        /* Grid for About Page */
        .about-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            align-items: start;
        }

        .placeholder-img {
            max-width: 90%;
            height: auto;
            background: #fff;
            aspect-ratio: 4/3;
            display: flex;
            align-items: right;
            justify-content: right;
            color: #888;
            font-size: 0.8rem;
            border: 1px solid #fff;
        }

		.placeholder-img img {
    		width: 100%;
    		height: 100%;
    		object-fit: cover;
    		display: block;
		}

        small {
            font-size: 0.85rem;
            display: block;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .wrapper { flex-direction: column; }
            nav, main { width: 100%; height: auto; position: static; }
            nav { border-right: none; border-bottom: 1px solid #f0f0f0; }
            .about-section { margin-top: 2rem; }
        }
    </style>
